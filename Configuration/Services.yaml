services:
  _defaults:
    autowire: true
    autoconfigure: true
    public: false

  JWeiland\ServiceBw2\:
    resource: '../Classes/*'

  cache.servicebw_additionalstuff:
    class: TYPO3\CMS\Core\Cache\Frontend\FrontendInterface
    factory: ['@TYPO3\CMS\Core\Cache\CacheManager', 'getCache']
    arguments: ['servicebw_additionalstuff']

  JWeiland\ServiceBw2\Command\CacheWarmupCommand:
    tags:
      - name: 'console.command'
        command: 'servicebw:cachewarmup'
        description: 'Warmup the caches of Service BW to improve loading times'

  JWeiland\ServiceBw2\Command\PrepareForSolrIndexingCommand:
    tags:
      - name: 'console.command'
        command: 'servicebw:preparesolrindex'
        description: 'Prepare records of service_bw2 to be indexed by EXT:solr'

  JWeiland\ServiceBw2\Helper\LeistungenHelper:
    public: true
    arguments:
      $cache: '@cache.servicebw_additionalstuff'

  # Will be called by GeneralUtility::makeInstance in a hook of DataHandler
  JWeiland\ServiceBw2\Hook\ClearCacheHook:
    public: true

  # To allow GeneralUtility::makeInstance
  JWeiland\ServiceBw2\Domain\Provider\ProviderFactory:
    public: true
    arguments:
      $providers: !tagged_iterator { tag: 'service-bw2.provider' }

  # To allow GeneralUtility::makeInstance
  JWeiland\ServiceBw2\Domain\Repository\RepositoryFactory:
    public: true
    arguments:
      $repositories: !tagged_iterator { tag: 'service-bw2.repository' }

  # TYPO3 extension solr might not be loaded. So, instantiation via GeneralUtility must be possible
  JWeiland\ServiceBw2\Service\SolrIndexService:
    autowire: false
    autoconfigure: false
    public: true

  # Will be called by GeneralUtility::makeInstance from FlexForm/TCA
  JWeiland\ServiceBw2\Tca\OrganisationseinheitenItems:
    public: true
